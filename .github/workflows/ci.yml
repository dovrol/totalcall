name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: ./scripts/restore.sh

      - name: Build solution
        run: ./scripts/build.sh

      - name: Build ops CLI explicitly
        run: dotnet build ops/cli/TotalCall.Cli/TotalCall.Cli.csproj --no-restore

      - name: Test
        run: ./scripts/test.sh
