name: Sync competition, results + OpenIPF / OpenPowerlifting data

on:
  workflow_dispatch:
    inputs:
      competition:
        description: "Competition"
        required: true
        default: "worlds-2026"
        type: choice
        options:
          - worlds-2026
      source:
        description: "Data source code"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - openipf
          - openpowerlifting
      results:
        description: "Official results import"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - none
  schedule:
    # Mondays 03:17 UTC
    - cron: "17 3 * * 1"

concurrency:
  group: sync-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore sync tool
        run: dotnet restore tools/sync/TotalCall.Sync/TotalCall.Sync.csproj

      - name: Run sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          TRIGGERED_BY: github-actions
          DOTNET_CONFIGURATION: Release
        run: |
          set -euo pipefail
          COMPETITION="${{ github.event.inputs.competition || '' }}"
          SOURCE="${{ github.event.inputs.source || '' }}"
          RESULTS="${{ github.event.inputs.results || 'auto' }}"

          if [ -z "$COMPETITION" ] && [ -z "$SOURCE" ]; then
            ./scripts/sync-supabase.sh
            exit 0
          fi

          case "$COMPETITION" in
            worlds-2026)
              COMPETITION_JSON="src/TotalCall.Client/wwwroot/data/competitions/worlds-2026.json"
              ;;
            *)
              echo "[error] Unknown competition: $COMPETITION" >&2
              exit 1
              ;;
          esac

          ./scripts/sync-supabase.sh "$COMPETITION_JSON" "$SOURCE" "$RESULTS"
