<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TotalCall</title>
    <base href="/" />
    <script>
        (function () {
            var key = "totalcall:theme";
            var stored = localStorage.getItem(key);
            var currentTheme = stored === "light" ? "light" : "dark";

            document.documentElement.dataset.theme = currentTheme;

            window.totalCallTheme = {
                get: function () {
                    return localStorage.getItem(key) || "dark";
                },
                set: function (theme) {
                    var nextTheme = theme === "light" ? "light" : "dark";
                    document.documentElement.dataset.theme = nextTheme;
                    localStorage.setItem(key, nextTheme);
                }
            };
        })();
    </script>
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="TotalCall.Client.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <div class="tc-loader" role="status" aria-live="polite" aria-label="Loading TotalCall">
            <div class="tc-loader__logo-wrap">
                <img class="tc-loader__logo tc-loader__logo--dark" src="assets/logo/totalcall-logo-horizontal.svg" alt="TotalCall" />
                <img class="tc-loader__logo tc-loader__logo--light" src="assets/logo/totalcall-logo-horizontal-light.svg" alt="TotalCall" />
            </div>
            <div class="tc-loader__progress" aria-hidden="true">
                <span class="tc-loader__bar"></span>
            </div>
            <p class="tc-loader__text"></p>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
