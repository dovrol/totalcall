<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TotalCall</title>
    <base href="/" />
    <script>
        (function () {
            var key = "totalcall:theme";
            var stored = localStorage.getItem(key);
            var currentTheme = stored === "light" ? "light" : "dark";

            document.documentElement.dataset.theme = currentTheme;

            window.totalCallTheme = {
                get: function () {
                    return localStorage.getItem(key) || "dark";
                },
                set: function (theme) {
                    var nextTheme = theme === "light" ? "light" : "dark";
                    document.documentElement.dataset.theme = nextTheme;
                    localStorage.setItem(key, nextTheme);
                }
            };
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&amp;family=Geist+Mono:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/topn.css" />
    <link rel="stylesheet" href="css/results.css" />
    <link rel="icon" type="image/svg+xml" href="assets/logo/favicon.svg" />
</head>

<body>
    <div id="app">
        <div class="tc-loader" role="status" aria-live="polite" aria-label="Loading TotalCall">
            <div class="tc-loader__brand" aria-hidden="true">
                <span class="tc-loader__mark-wrap">
                    <img class="tc-loader__mark tc-loader__mark--dark" src="assets/logo/totalcall-mark.svg" alt="" />
                    <img class="tc-loader__mark tc-loader__mark--light" src="assets/logo/totalcall-mark-light.svg" alt="" />
                </span>
                <span class="tc-loader__copy">
                    <span class="tc-loader__title-row">
                        <span class="tc-loader__title">
                            <span class="tc-loader__title-total">Total</span><span class="tc-loader__title-call">Call</span>
                        </span>
                        <span class="tc-loader__beta">BETA</span>
                    </span>
                    <span class="tc-loader__subtitle">Powerlifting Predictions</span>
                </span>
            </div>
            <div class="tc-loader__progress" aria-hidden="true">
                <span class="tc-loader__bar"></span>
            </div>
            <p class="tc-loader__text"></p>
        </div>
    </div>

    <div id="blazor-error-ui" role="alert" aria-live="assertive">
        <div class="blazor-error-ui__icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m21.73 18-8-14a2 2 0 0 0-3.46 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"></path>
                <path d="M12 9v4"></path>
                <path d="M12 17h.01"></path>
            </svg>
        </div>
        <div class="blazor-error-ui__copy">
            <strong data-error-title>Aplikacja napotkała problem</strong>
            <span data-error-description>Odśwież stronę. Jeśli problem wraca po aktualizacji lub przebudowie, użyj naprawy cache.</span>
        </div>
        <div class="blazor-error-ui__actions">
            <button type="button" class="blazor-error-ui__repair" data-repair-cache>Napraw cache i odśwież</button>
            <a href="." class="reload" data-reload-label>Odśwież</a>
        </div>
        <button type="button" class="dismiss" aria-label="Zamknij" data-dismiss-label>
            <svg class="dismiss-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M18 6 6 18"></path>
                <path d="m6 6 12 12"></path>
            </svg>
        </button>
    </div>
    <script src="js/totalcall-bootstrap-recovery.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="js/totalcall-actions.js"></script>
    <script src="js/totalcall-topn.js"></script>
    <script src="js/totalcall-windows.js"></script>
    <!-- ANALYTICS_SNIPPET -->
</body>

</html>
